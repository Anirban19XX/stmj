# Production deployment of the Aegis frontend to Vercel.
#
# Triggered on every push to `main` (i.e. after a PR merges). The job builds and
# tests the Next.js app, deploys the prebuilt output to Vercel production, then
# smoke-tests the resulting URL.
#
# Required repository secrets:
#   VERCEL_TOKEN       — Vercel personal/CI token (Account Settings → Tokens)
#   VERCEL_ORG_ID      — from `vercel link` / .vercel/project.json
#   VERCEL_PROJECT_ID  — from `vercel link` / .vercel/project.json
name: Deploy

on:
  push:
    branches: [main]

# Never run two production deploys concurrently.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build, test & deploy (Vercel)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      # Sanity build with the project's own toolchain. `vercel build` below
      # performs the canonical build that is actually deployed, but running the
      # local build first fails fast on TS/Next errors without spending Vercel
      # build minutes.
      - name: Build (sanity check)
        run: npm run build

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Pull project settings + production env vars from Vercel into .vercel/.
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build for Vercel (production)
        run: vercel build --prod --token="$VERCEL_TOKEN"

      # Deploy the prebuilt output and capture the deployment URL on stdout.
      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          url="$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")"
          echo "Deployed to: $url"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      # Smoke test: the production URL must return HTTP 200.
      - name: Validate deployment (HTTP 200)
        run: |
          url="${{ steps.deploy.outputs.url }}"
          echo "Validating $url ..."
          # Retry a few times to allow the CDN/edge to warm up.
          for attempt in 1 2 3 4 5; do
            status="$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$url")"
            echo "Attempt $attempt: HTTP $status"
            if [ "$status" = "200" ]; then
              echo "Deployment is live and healthy."
              exit 0
            fi
            sleep 10
          done
          echo "::error::Deployment did not return HTTP 200 (last status: $status)"
          exit 1
